<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4EFE6" />
    <meta
      name="description"
      content="54 Partners — cabinet de conseil panafricain combinant conseil stratégique, juridique & fiscal et mobilisation financière pour l'Afrique." />
    <meta property="og:title" content="54 Partners — Conseil Stratégique, Juridique & Financier" />
    <meta property="og:description" content="Cabinet de conseil panafricain : stratégie, droit & fiscalité, mobilisation financière, au service de la performance et de l'impact en Afrique." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Archivo:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <title>54 Partners — Conseil Stratégique, Juridique &amp; Financier</title>
    <style>
      :root {
        --ink: #17130d;
        --ink2: #241c10;
        --cream: #f4efe6;
        --paper: #fbf7ef;
        --gold: #a9812e;
        --goldb: #d8b24a;
        --goldd: #7a5c1c;
        --muted: #6e6556;
        --line: rgba(23, 19, 13, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Archivo", system-ui, sans-serif;
        color: var(--ink);
        background: var(--cream);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      ::selection {
        background: var(--gold);
        color: var(--paper);
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      input,
      textarea {
        font-family: inherit;
      }

      img {
        max-width: 100%;
      }

      .serif {
        font-family: "Cormorant Garamond", serif;
      }

      .wrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 clamp(20px, 5vw, 48px);
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-16px);
        }
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .eyebrow-line {
        width: 34px;
        height: 1.5px;
        background: var(--gold);
        display: inline-block;
        flex: none;
      }

      .eyebrow-label {
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--goldd);
        font-weight: 600;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 14.5px;
        font-weight: 600;
        padding: 15px 28px;
        border-radius: 999px;
        transition:
          transform 0.3s,
          box-shadow 0.3s,
          background 0.3s,
          border-color 0.3s;
        white-space: nowrap;
      }

      .btn-arrow {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        line-height: 0;
      }

      .btn-gold {
        color: var(--ink);
        background: linear-gradient(96deg, #e7cb74, #b4903a);
        box-shadow: 0 10px 30px -12px rgba(216, 178, 74, 0.6);
      }

      .btn-gold:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 40px -12px rgba(216, 178, 74, 0.75);
      }

      .btn-outline-light {
        color: var(--paper);
        border: 1px solid rgba(237, 231, 218, 0.28);
        font-weight: 500;
      }

      .btn-outline-light:hover {
        border-color: var(--goldb);
        background: rgba(237, 231, 218, 0.05);
      }

      .btn-ink {
        color: var(--paper);
        background: var(--ink);
      }

      .btn-ink:hover {
        background: var(--gold);
        transform: translateY(-1px);
      }

      /* ---------- reveal-on-scroll ---------- */
      .reveal {
        opacity: 0;
        transform: translateY(22px);
        transition:
          opacity 0.8s cubic-bezier(0.2, 0.7, 0.2, 1),
          transform 0.8s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .reveal.d1 {
        transition-delay: 0.08s;
      }
      .reveal.d2 {
        transition-delay: 0.16s;
      }
      .reveal.d3 {
        transition-delay: 0.24s;
      }
      .reveal.d4 {
        transition-delay: 0.34s;
      }
      .reveal.is-visible {
        opacity: 1;
        transform: none;
      }

      /* ---------- header / nav ---------- */
      #site-header {
        position: sticky;
        top: 0;
        z-index: 60;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        background: rgba(244, 239, 230, 0.82);
        border-bottom: 1px solid var(--line);
      }

      .nav-row {
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .brand-link img {
        height: 52px;
        width: auto;
        display: block;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: clamp(14px, 2.4vw, 34px);
      }

      .nav-desktop {
        display: flex;
        align-items: center;
        gap: clamp(14px, 2.2vw, 30px);
      }

      .nav-link {
        position: relative;
        font-size: 13.5px;
        letter-spacing: 0.02em;
        padding: 6px 0;
        transition: color 0.25s;
      }

      .nav-link:hover {
        color: var(--gold);
      }

      .nav-link.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -2px;
        height: 2px;
        background: var(--gold);
      }

      .lang-toggle {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 12px;
        transition: border-color 0.25s;
      }

      .lang-toggle:hover {
        border-color: var(--gold);
      }

      .lang-toggle b {
        font-weight: 700;
        color: var(--ink);
      }

      .lang-toggle span.sep {
        opacity: 0.5;
      }

      .nav-cta {
        font-size: 13px;
        padding: 11px 20px;
      }

      .hamburger {
        display: none;
        width: 38px;
        height: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        flex: none;
      }

      .hamburger span {
        position: relative;
        width: 16px;
        height: 1.5px;
        background: var(--ink);
        display: block;
      }

      .hamburger span::before,
      .hamburger span::after {
        content: "";
        position: absolute;
        left: 0;
        width: 16px;
        height: 1.5px;
        background: var(--ink);
      }

      .hamburger span::before {
        top: -5px;
      }
      .hamburger span::after {
        top: 5px;
      }

      #mobile-nav {
        display: none;
        border-bottom: 1px solid var(--line);
        background: var(--paper);
      }

      #mobile-nav.open {
        display: block;
      }

      .mobile-nav-inner {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 14px clamp(20px, 5vw, 48px) 22px;
      }

      .mobile-nav-inner .nav-link {
        padding: 12px 0;
        font-size: 15px;
      }

      .mobile-nav-inner .lang-toggle,
      .mobile-nav-inner .nav-cta {
        align-self: flex-start;
        margin-top: 8px;
      }

      @media (max-width: 900px) {
        .nav-desktop {
          display: none;
        }
        .nav-right > .lang-toggle,
        .nav-right > .nav-cta {
          display: none;
        }
        .hamburger {
          display: flex;
        }
      }

      /* ---------- hero ---------- */
      .hero {
        position: relative;
        background: var(--ink);
        color: var(--paper);
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(120% 90% at 82% 8%, rgba(216, 178, 74, 0.2), transparent 55%),
          radial-gradient(90% 70% at 0% 100%, rgba(169, 129, 46, 0.14), transparent 60%);
      }

      .hero-eagle {
        position: absolute;
        top: 9%;
        right: -2%;
        width: min(640px, 54vw);
        opacity: 0.14;
        mix-blend-mode: screen;
        animation: floaty 9s ease-in-out infinite;
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        padding: clamp(72px, 12vh, 150px) 0 clamp(56px, 9vh, 110px);
      }

      .hero-kicker {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 30px;
      }

      .hero-kicker span.line {
        width: 40px;
        height: 1.5px;
        background: var(--goldb);
        display: inline-block;
      }

      .hero-kicker span.label {
        font-size: 12.5px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--goldb);
        font-weight: 600;
      }

      .hero h1 {
        font-weight: 600;
        font-size: clamp(44px, 7.2vw, 104px);
        line-height: 0.98;
        letter-spacing: -0.015em;
        margin: 0;
        max-width: 15ch;
        font-family: "Cormorant Garamond", serif;
      }

      .hero h1 em {
        background: linear-gradient(96deg, #b4903a, #e7cb74 55%, #c79a34);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-style: italic;
      }

      .hero-lead {
        font-size: clamp(16px, 1.5vw, 20px);
        line-height: 1.62;
        color: rgba(237, 231, 218, 0.82);
        max-width: 60ch;
        margin: 34px 0 0;
      }

      .hero-ctas {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 42px;
      }

      .hero-note {
        margin-top: clamp(48px, 7vh, 84px);
        padding-top: 26px;
        border-top: 1px solid rgba(237, 231, 218, 0.14);
        display: flex;
        align-items: baseline;
        gap: 18px;
        max-width: 64ch;
      }

      .hero-note .big54 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 700;
        font-size: clamp(40px, 5vw, 64px);
        line-height: 1;
        background: linear-gradient(120deg, #e7cb74, #b4903a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .hero-note p {
        font-size: 14px;
        line-height: 1.55;
        color: rgba(237, 231, 218, 0.7);
        margin: 0;
      }

      /* ---------- positioning band ---------- */
      .positioning {
        background: var(--paper);
        border-bottom: 1px solid var(--line);
      }

      .positioning .wrap {
        max-width: 1040px;
        padding-top: clamp(56px, 8vh, 100px);
        padding-bottom: clamp(56px, 8vh, 100px);
      }

      .positioning p {
        font-family: "Cormorant Garamond", serif;
        font-weight: 500;
        font-size: clamp(24px, 3.2vw, 42px);
        line-height: 1.28;
        letter-spacing: -0.01em;
        margin: 0;
        text-wrap: balance;
      }

      /* ---------- generic section heading ---------- */
      .section-head {
        max-width: 60ch;
        margin-bottom: clamp(36px, 5vh, 60px);
      }

      .section-head h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(30px, 4.2vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.015em;
        margin: 0 0 14px;
      }

      .section-head p {
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted);
        margin: 0;
      }

      /* ---------- pillars preview (home) ---------- */
      .pillars-section {
        padding: clamp(64px, 10vh, 120px) 0;
      }

      .pillars-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(14px, 1.6vw, 22px);
      }

      @media (max-width: 780px) {
        .pillars-grid {
          grid-template-columns: 1fr;
        }
      }

      .pillar-card {
        text-align: left;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(24px, 2.4vw, 34px);
        display: flex;
        flex-direction: column;
        min-height: 280px;
        width: 100%;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      .pillar-card:hover {
        border-color: var(--gold);
        box-shadow: 0 24px 50px -34px rgba(23, 19, 13, 0.4);
      }

      .pillar-num {
        font-family: "Cormorant Garamond", serif;
        font-weight: 700;
        font-size: clamp(38px, 4vw, 56px);
        line-height: 1;
        background: linear-gradient(120deg, #b4903a, #e7cb74);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .pillar-card h3 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(21px, 1.9vw, 27px);
        line-height: 1.12;
        margin: 20px 0 12px;
        color: var(--ink);
      }

      .pillar-card p {
        font-size: 14.5px;
        line-height: 1.58;
        color: var(--muted);
        margin: 0 0 22px;
        flex: 1;
      }

      .learn-more {
        font-size: 12.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--goldd);
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      /* ---------- approach ---------- */
      .approach {
        background: var(--ink);
        color: var(--paper);
        position: relative;
        overflow: hidden;
      }

      .approach-eagle {
        position: absolute;
        bottom: 2%;
        left: -3%;
        width: min(580px, 48vw);
        opacity: 0.1;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .approach .wrap {
        position: relative;
        padding: clamp(64px, 10vh, 120px) clamp(20px, 5vw, 48px);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(32px, 5vw, 80px);
        align-items: center;
      }

      @media (max-width: 860px) {
        .approach .wrap {
          grid-template-columns: 1fr;
        }
      }

      .approach h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(30px, 4.2vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.015em;
        margin: 0 0 22px;
      }

      .approach-text {
        font-size: 16px;
        line-height: 1.64;
        color: rgba(237, 231, 218, 0.78);
        margin: 0;
        max-width: 52ch;
      }

      .approach-points {
        display: flex;
        flex-direction: column;
      }

      .approach-point {
        display: flex;
        align-items: center;
        gap: 22px;
        padding: 22px 0;
        border-top: 1px solid rgba(237, 231, 218, 0.16);
      }

      .approach-point:last-child {
        border-bottom: 1px solid rgba(237, 231, 218, 0.16);
      }

      .approach-point .n {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: 20px;
        color: var(--goldb);
        min-width: 44px;
      }

      .approach-point .label {
        font-size: clamp(17px, 1.7vw, 22px);
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
      }

      /* ---------- clients preview (home) ---------- */
      .clients-section {
        padding: clamp(64px, 10vh, 120px) 0;
      }

      .clients-head-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: clamp(30px, 4vh, 52px);
      }

      .clients-head-row h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(30px, 4.2vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.015em;
        margin: 0;
      }

      .all-clients-link {
        font-size: 13px;
        letter-spacing: 0.06em;
        color: var(--goldd);
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--gold);
        transition: gap 0.25s;
      }

      .all-clients-link:hover {
        gap: 12px;
      }

      .clients-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(14px, 1.6vw, 20px);
      }

      @media (max-width: 700px) {
        .clients-grid {
          grid-template-columns: 1fr;
        }
      }

      .client-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(24px, 2.4vw, 34px);
        display: flex;
        gap: 22px;
        align-items: flex-start;
      }

      .client-card .num {
        font-family: "Cormorant Garamond", serif;
        font-weight: 500;
        font-size: clamp(28px, 3vw, 40px);
        line-height: 1;
        color: var(--gold);
        opacity: 0.55;
        min-width: 52px;
      }

      .client-card h3 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(20px, 1.9vw, 26px);
        margin: 2px 0 10px;
        color: var(--ink);
      }

      .client-card p {
        font-size: 14.5px;
        line-height: 1.58;
        color: var(--muted);
        margin: 0;
      }

      /* ---------- vision + values ---------- */
      .vision {
        background: var(--paper);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .vision .wrap {
        padding: clamp(64px, 10vh, 120px) clamp(20px, 5vw, 48px);
      }

      .vision-head {
        max-width: 70ch;
        margin-bottom: clamp(44px, 6vh, 72px);
      }

      .vision-head p {
        font-family: "Cormorant Garamond", serif;
        font-weight: 500;
        font-size: clamp(24px, 3.4vw, 44px);
        line-height: 1.24;
        letter-spacing: -0.01em;
        margin: 0;
        text-wrap: balance;
      }

      .values-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: clamp(16px, 2vw, 32px);
      }

      @media (max-width: 900px) {
        .values-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 480px) {
        .values-grid {
          grid-template-columns: 1fr;
        }
      }

      .value-card {
        border-top: 2px solid var(--gold);
        padding-top: 20px;
      }

      .value-card h3 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(20px, 1.8vw, 25px);
        margin: 0 0 10px;
      }

      .value-card p {
        font-size: 14px;
        line-height: 1.58;
        color: var(--muted);
        margin: 0;
      }

      /* ---------- cta band ---------- */
      .cta-band {
        background: var(--ink);
        color: var(--paper);
        position: relative;
        overflow: hidden;
      }

      .cta-band::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(100% 120% at 85% 0%, rgba(216, 178, 74, 0.18), transparent 55%);
      }

      .cta-band .wrap {
        position: relative;
        max-width: 1000px;
        padding: clamp(64px, 11vh, 130px) clamp(20px, 5vw, 48px);
        text-align: center;
      }

      .cta-band h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(30px, 4.6vw, 60px);
        line-height: 1.06;
        letter-spacing: -0.015em;
        margin: 0 auto;
        max-width: 20ch;
        text-wrap: balance;
      }

      .cta-band p {
        font-size: clamp(15px, 1.5vw, 19px);
        line-height: 1.6;
        color: rgba(237, 231, 218, 0.78);
        margin: 22px auto 0;
        max-width: 56ch;
      }

      .cta-band .btn {
        margin-top: 38px;
        font-size: 15px;
        padding: 16px 32px;
      }

      /* ---------- page header (expertise/clients) ---------- */
      .page-head {
        padding: clamp(56px, 9vh, 110px) 0 clamp(20px, 3vh, 40px);
      }

      .page-head-inner {
        max-width: 66ch;
      }

      .page-head h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(38px, 6vw, 82px);
        line-height: 1;
        letter-spacing: -0.02em;
        margin: 0 0 22px;
      }

      .page-head p {
        font-size: clamp(16px, 1.5vw, 19px);
        line-height: 1.64;
        color: var(--muted);
        margin: 0;
      }

      /* ---------- expertise cards ---------- */
      .expertise-list {
        padding: clamp(30px, 4vh, 56px) 0 clamp(56px, 8vh, 100px);
        display: flex;
        flex-direction: column;
        gap: clamp(18px, 2vw, 28px);
      }

      .expertise-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: clamp(28px, 3.4vw, 52px);
        display: grid;
        grid-template-columns: 0.85fr 1.15fr;
        gap: clamp(24px, 4vw, 64px);
      }

      @media (max-width: 760px) {
        .expertise-card {

                  "Relations with DFIs, donors and impact funds",
                  "Preparation of fundraising files and data rooms",
                  "Coordination of due diligence and term-sheet negotiation",
                  "Support through closing and post-investment monitoring"
                ]
              }
            ],
            clients: [
              { num: "01", title: "Businesses", desc: "Growing SMEs, national groups and multinationals looking to expand, structure or establish themselves in Africa. We support their strategy, compliance and financing." },
              { num: "02", title: "Investors", desc: "Local and international investors, impact and private equity funds seeking structured opportunities and high-potential projects across the continent." },
              { num: "03", title: "Development partners", desc: "Development finance institutions (DFIs), donors, international organisations and NGOs seeking to deploy impact programmes with a trusted local partner." },
              { num: "04", title: "Governments", desc: "Ministries, public agencies and local authorities seeking to attract investment, structure strategic projects and implement development policies." }
            ],
            values: [
              { title: "Excellence", desc: "Rigour and quality in every engagement. We commit to measurable, documented results." },
              { title: "Impact", desc: "Priority to projects that create economic, social and environmental value, in service of Africa’s development." },
              { title: "Integration", desc: "A unified approach combining strategy, law and finance, for seamless, coherent support." },
              { title: "Proximity", desc: "Local roots and field knowledge. Our team understands the operational realities of African markets." }
            ],
            approachPoints: [
              { n: "01", label: "Strategy & decision" },
              { n: "02", label: "Legal & tax security" },
              { n: "03", label: "Capital & closing" }
            ]
          }
        };

        var state = {
          lang: "fr",
          page: "home",
          sent: false,
          navOpen: false
        };

        function parsePage() {
          var h = (location.hash || "").replace(/^#\/?/, "");
          return PAGES.indexOf(h) !== -1 ? h : "home";
        }

        function arrow() {
          return '<span class="btn-arrow">→</span>';
        }

        function eyebrow(label) {
          return (
            '<div class="eyebrow">' +
            '<span class="eyebrow-line"></span>' +
            '<span class="eyebrow-label">' + label + "</span>" +
            "</div>"
          );
        }

        function navLink(page, label) {
          var active = state.page === page ? " active" : "";
          return '<a class="nav-link' + active + '" href="#/' + page + '">' + label + "</a>";
        }

        function renderHeader() {
          var t = T[state.lang];
          var langCur = state.lang === "fr" ? "FR" : "EN";
          var langOther = state.lang === "fr" ? "EN" : "FR";
          var links = navLink("home", t.nav.home) + navLink("expertise", t.nav.expertise) + navLink("clients", t.nav.clients) + navLink("contact", t.nav.contact);
          var langToggle =
            '<button class="lang-toggle" type="button" data-action="toggle-lang" title="Language">' +
            "<b>" + langCur + "</b><span class=\"sep\">/</span><span>" + langOther + "</span>" +
            "</button>";
          var cta = '<a class="btn btn-ink nav-cta" href="#/contact">' + t.nav.cta + "</a>";

          return (
            '<nav class="wrap nav-row">' +
              '<a class="brand-link" href="#/home" aria-label="54 Partners"><img src="./public/images/logo-light.png" alt="54 Partners"></a>' +
              '<div class="nav-right">' +
                '<nav class="nav-desktop">' + links + "</nav>" +
                langToggle +
                cta +
                '<button class="hamburger" type="button" data-action="toggle-nav" aria-label="Menu" aria-expanded="' + state.navOpen + '"><span></span></button>' +
              "</div>" +
            "</nav>" +
            '<div id="mobile-nav" class="' + (state.navOpen ? "open" : "") + '">' +
              '<div class="mobile-nav-inner">' + links + langToggle + cta + "</div>" +
            "</div>"
          );
        }

        function renderFooter() {
          var t = T[state.lang];
          return (
            '<div class="wrap">' +
              '<div class="footer-top">' +
                '<div class="footer-brand">' +
                  '<img src="./public/images/logo-dark.png" alt="54 Partners">' +
                  "<p>" + t.tagline + "</p>" +
                "</div>" +
                '<div class="footer-cols">' +
                  '<div class="footer-col">' +
                    '<span class="footer-col-title">' + t.footer.site + "</span>" +
                    '<a href="#/home">' + t.nav.home + "</a>" +
                    '<a href="#/expertise">' + t.nav.expertise + "</a>" +
                    '<a href="#/clients">' + t.nav.clients + "</a>" +
                    '<a href="#/contact">' + t.nav.contact + "</a>" +
                  "</div>" +
                  '<div class="footer-col">' +
                    '<span class="footer-col-title">' + t.footer.contactTitle + "</span>" +
                    "<span>Dakar, Sénégal</span>" +
                    '<a href="mailto:contact@54partners.africa">contact@54partners.africa</a>' +
                    "<span>www.54partners.africa</span>" +
                  "</div>" +
                "</div>" +
              "</div>" +
              '<div class="footer-bottom">' +
                "<span>" + t.footer.rights + "</span>" +
                "<span>" + t.footer.made + "</span>" +
              "</div>" +
            "</div>"
          );
        }

        function renderHome() {
          var t = T[state.lang];

          var hero =
            '<section class="hero">' +
              '<img class="hero-eagle" src="./public/images/eagle-motif.png" alt="">' +
              '<div class="wrap hero-inner">' +
                '<div class="hero-kicker reveal"><span class="line"></span><span class="label">' + t.hero.kicker + "</span></div>" +
                '<h1 class="reveal d1">' + t.hero.t1 + "<br><em>" + t.hero.t2 + "</em></h1>" +
                '<p class="hero-lead reveal d2">' + t.hero.lead + "</p>" +
                '<div class="hero-ctas reveal d3">' +
                  '<a class="btn btn-gold" href="#/contact">' + t.hero.cta1 + " " + arrow() + "</a>" +
                  '<a class="btn btn-outline-light" href="#/expertise">' + t.hero.cta2 + "</a>" +
                "</div>" +
                '<div class="hero-note reveal d4">' +
                  '<span class="big54">54</span>' +
                  "<p>" + t.hero.note54 + "</p>" +
                "</div>" +
              "</div>" +
            "</section>";

          var positioning =
            '<section class="positioning"><div class="wrap"><p class="reveal">' + t.home.posText + "</p></div></section>";

          var pillarCards = t.pillars
            .map(function (p) {
              return (
                '<a class="pillar-card reveal" href="#/expertise">' +
                  '<span class="pillar-num">' + p.num + "</span>" +
                  "<h3>" + p.title + "</h3>" +
                  "<p>" + p.short + "</p>" +
                  '<span class="learn-more">' + t.home.learnMore + " " + arrow() + "</span>" +
                "</a>"
              );
            })
            .join("");

          var pillarsSection =
            '<section class="wrap pillars-section">' +
              '<div class="section-head reveal">' +
                eyebrow(t.home.pillarsEyebrow) +
                "<h2>" + t.home.pillarsTitle + "</h2>" +
                "<p>" + t.home.pillarsLead + "</p>" +
              "</div>" +
              '<div class="pillars-grid">' + pillarCards + "</div>" +
            "</section>";

          var approachPoints = t.approachPoints
            .map(function (pt) {
              return '<div class="approach-point"><span class="n">' + pt.n + '</span><span class="label">' + pt.label + "</span></div>";
            })
            .join("");

          var approach =
            '<section class="approach">' +
              '<img class="approach-eagle" src="./public/images/eagle-motif.png" alt="">' +
              '<div class="wrap">' +
                '<div class="reveal">' +
                  eyebrow(t.home.approachEyebrow) +
                  "<h2>" + t.home.approachTitle + "</h2>" +
                  '<p class="approach-text">' + t.home.approachText + "</p>" +
                "</div>" +
                '<div class="approach-points reveal">' + approachPoints + "</div>" +
              "</div>" +
            "</section>";

          var clientCards = t.clients
            .slice(0, 4)
            .map(function (c) {
              return (
                '<div class="client-card reveal"><span class="num">' + c.num + "</span><div><h3>" + c.title + "</h3><p>" + c.desc + "</p></div></div>"
              );
            })
            .join("");

          var clientsPreview =
            '<section class="wrap clients-section">' +
              '<div class="clients-head-row reveal">' +
                "<div>" + eyebrow(t.home.clientsEyebrow) + "<h2>" + t.home.clientsTitle + "</h2></div>" +
                '<a class="all-clients-link" href="#/clients">' + t.home.allClients + " " + arrow() + "</a>" +
              "</div>" +
              '<div class="clients-grid">' + clientCards + "</div>" +
            "</section>";

          var valueCards = t.values
            .map(function (v) {
              return '<div class="value-card reveal"><h3>' + v.title + "</h3><p>" + v.desc + "</p></div>";
            })
            .join("");

          var vision =
            '<section class="vision"><div class="wrap">' +
              '<div class="vision-head reveal">' + eyebrow(t.home.visionEyebrow) + "<p>" + t.home.visionText + "</p></div>" +
              '<div class="values-grid">' + valueCards + "</div>" +
            "</div></section>";

          var ctaBand =
            '<section class="cta-band"><div class="wrap reveal">' +
              "<h2>" + t.home.ctaTitle + "</h2>" +
              "<p>" + t.home.ctaText + "</p>" +
              '<a class="btn btn-gold" href="#/contact">' + t.home.ctaBtn + " " + arrow() + "</a>" +
            "</div></section>";

          return hero + positioning + pillarsSection + approach + clientsPreview + vision + ctaBand;
        }

        function renderExpertise() {
          var t = T[state.lang];

          var head =
            '<section class="wrap page-head"><div class="page-head-inner reveal">' +
              eyebrow(t.expertise.eyebrow) +
              "<h1>" + t.expertise.title + "</h1>" +
              "<p>" + t.expertise.lead + "</p>" +
            "</div></section>";

          var cards = t.pillars
            .map(function (p) {
              var items = p.items
                .map(function (it) {
                  return '<div class="expertise-item"><span class="dot"></span><span class="txt">' + it + "</span></div>";
                })
                .join("");
              return (
                '<div class="expertise-card reveal">' +
                  "<div>" +
                    '<span class="big-num">' + p.num + "</span>" +
                    "<h2>" + p.title + "</h2>" +
                    "<p>" + p.desc + "</p>" +
                  "</div>" +
                  '<div class="expertise-items">' + items + "</div>" +
                "</div>"
              );
            })
            .join("");

          var list = '<section class="wrap expertise-list">' + cards + "</section>";

          var integrated =
            '<section class="integrated">' +
              '<img class="integrated-eagle" src="./public/images/eagle-motif.png" alt="">' +
              '<div class="wrap reveal">' +
                eyebrow(t.expertise.integratedEyebrow) +
                "<h2>" + t.expertise.integratedTitle + "</h2>" +
                "<p>" + t.expertise.integratedText + "</p>" +
                '<a class="btn btn-gold" href="#/contact">' + t.nav.cta + " " + arrow() + "</a>" +
              "</div>" +
            "</section>";

          return head + list + integrated;
        }

        function renderClients() {
          var t = T[state.lang];

          var head =
            '<section class="wrap page-head"><div class="page-head-inner reveal">' +
              eyebrow(t.clientsPage.eyebrow) +
              "<h1>" + t.clientsPage.title + "</h1>" +
              "<p>" + t.clientsPage.lead + "</p>" +
            "</div></section>";

          var rows = t.clients
            .map(function (c) {
              return (
                '<div class="client-row reveal">' +
                  '<span class="num">' + c.num + "</span>" +
                  "<div><h2>" + c.title + "</h2><p>" + c.desc + "</p></div>" +
                "</div>"
              );
            })
            .join("");

          var rowsSection = '<section class="wrap clients-rows">' + rows + "</section>";

          var cta =
            '<section class="clients-cta"><div class="wrap reveal">' +
              "<h2>" + t.home.ctaTitle + "</h2>" +
              '<a class="btn btn-ink" href="#/contact">' + t.home.ctaBtn + " " + arrow() + "</a>" +
            "</div></section>";

          return head + rowsSection + cta;
        }

        function renderContact() {
          var t = T[state.lang];

          var info =
            '<div class="contact-info reveal">' +
              eyebrow(t.contact.eyebrow) +
              "<h1>" + t.contact.title + "</h1>" +
              "<p>" + t.contact.lead + "</p>" +
              '<div class="contact-rows">' +
                '<div class="contact-row"><span class="label">' + t.contact.cityLabel + '</span><span class="value">Dakar, Sénégal</span></div>' +
                '<div class="contact-row"><span class="label">E-mail</span><a class="value" href="mailto:contact@54partners.africa">contact@54partners.africa</a></div>' +
                '<div class="contact-row"><span class="label">Web</span><span class="value">www.54partners.africa</span></div>' +
              "</div>" +
            "</div>";

          var cardInner;
          if (state.sent) {
            cardInner =
              '<div class="contact-sent">' +
                '<span class="big54">54</span>' +
                "<h2>" + t.contact.sentTitle + "</h2>" +
                "<p>" + t.contact.sentText + "</p>" +
              "</div>";
          } else {
            cardInner =
              "<h2>" + t.contact.formTitle + "</h2>" +
              '<form class="contact-form" id="contact-form" novalidate>' +
                "<label>" + t.contact.formName + '<input type="text" name="name" placeholder="' + t.contact.phName + '" required></label>' +
                "<label>" + t.contact.formEmail + '<input type="email" name="email" placeholder="' + t.contact.phEmail + '" required></label>' +
                "<label>" + t.contact.formOrg + '<input type="text" name="org" placeholder="' + t.contact.phOrg + '"></label>' +
                "<label>" + t.contact.formMsg + '<textarea rows="3" name="message" placeholder="' + t.contact.phMsg + '" required></textarea></label>' +
                '<button class="btn btn-gold" type="submit">' + t.contact.formBtn + " " + arrow() + "</button>" +
              "</form>";
          }

          var card = '<div class="contact-card reveal d1">' + cardInner + "</div>";

          return '<section class="wrap contact-section">' + info + card + "</section>";
        }

        function renderMain() {
          switch (state.page) {
            case "expertise":
              return renderExpertise();
            case "clients":
              return renderClients();
            case "contact":
              return renderContact();
            default:
              return renderHome();
          }
        }

        var io = null;
        var revealTimer = null;

        function setupReveal() {
          if (io) io.disconnect();
          var nodes = document.querySelectorAll(".reveal:not(.is-visible)");
          if (typeof IntersectionObserver === "undefined") {
            nodes.forEach(function (el) {
              el.classList.add("is-visible");
            });
            return;
          }
          io = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("is-visible");
                  io.unobserve(entry.target);
                }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -6% 0px" }
          );
          nodes.forEach(function (el) {
            io.observe(el);
          });
          clearTimeout(revealTimer);
          revealTimer = setTimeout(function () {
            document.querySelectorAll(".reveal:not(.is-visible)").forEach(function (el) {
              var r = el.getBoundingClientRect();
              if (r.top < window.innerHeight * 0.96) el.classList.add("is-visible");
            });
          }, 500);
        }

        function bindContactForm() {
          var form = document.getElementById("contact-form");
          if (!form) return;
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            if (form.checkValidity()) {
              state.sent = true;
              render();
            } else {
              form.reportValidity();
            }
          });
        }

        function render() {
          document.getElementById("site-header").innerHTML = renderHeader();
          document.getElementById("site-main").innerHTML = renderMain();
          document.getElementById("site-footer").innerHTML = renderFooter();
          document.documentElement.lang = state.lang;
          setupReveal();
          bindContactForm();
        }

        document.addEventListener("click", function (e) {
          var actionEl = e.target.closest("[data-action]");
          if (actionEl) {
            var action = actionEl.getAttribute("data-action");
            if (action === "toggle-lang") {
              state.lang = state.lang === "fr" ? "en" : "fr";
              render();
            } else if (action === "toggle-nav") {
              state.navOpen = !state.navOpen;
              render();
            }
            return;
          }
          if (e.target.closest("#mobile-nav a") && state.navOpen) {
            state.navOpen = false;
          }
        });

        window.addEventListener("hashchange", function () {
          state.page = parsePage();
          state.sent = false;
          state.navOpen = false;
          render();
          window.scrollTo({ top: 0, behavior: "instant" });
        });

        state.page = parsePage();
        render();
      })();
    </script>
  </body>
</html>
